<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      padding: 16px;
      background: #fff;
    }
    h1 { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 4px; }
    p  { font-size: 12px; color: #666; margin-bottom: 14px; line-height: 1.4; }
    button {
      width: 100%;
      padding: 9px 14px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #444;
      min-height: 18px;
      line-height: 1.4;
    }
    #status.ok  { color: #16a34a; }
    #status.err { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Mica CRM — Sync Contactos</h1>
  <p>Lee los nombres de WhatsApp Web y los sincroniza con el CRM para los contactos sin nombre.</p>
  <button id="btn">Sincronizar ahora</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
