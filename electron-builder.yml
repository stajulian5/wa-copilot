appId: com.mica.wacopilot
productName: WA Copilot
copyright: Copyright © 2024 Mica

directories:
  buildResources: build
  output: dist

files:
  - out/**/*

# Bundle the Chrome extension inside the .app so the path is always valid
extraResources:
  - from: WA Copilot - Sync Contacts/
    to: WA Copilot - Sync Contacts/
    filter:
      - "**/*"
  # Bundle DB migrations — `src/` is not part of `files`, so without this
  # drizzle's migrate() can't find the migrations folder in production and
  # silently never runs (existsSync check fails).
  - from: src/server/db/migrations
    to: migrations
    filter:
      - "**/*"

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  # Explicit artifact name so latest-mac.yml and the actual files always match.
  # Without this, electron-builder uses dashes in the YML but dots on disk → 404.
  artifactName: WA.Copilot-${version}-${arch}.${ext}
  # Universal covers both Apple Silicon (M1/M2/M3) and Intel Macs
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  category: public.app-category.business
  darkModeSupport: true
  icon: build/icon.icns
  # Required for notarization
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization — set to true; credentials come from env vars:
  # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  notarize: true

dmg:
  title: WA Copilot
  icon: build/icon.icns
  # Drag-to-Applications install window
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 190
      type: file
    - x: 400
      y: 190
      type: link
      path: /Applications
  iconSize: 100

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: WA Copilot
  runAfterFinish: true

publish:
  provider: github
  owner: stajulian5
  repo: wa-copilot
  releaseType: release
